<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Movies — Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Helvetica, Arial, sans-serif;
      background: #111;
      color: #e8e8e8;
      min-height: 100vh;
    }

    header {
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      padding: 18px 0 14px;
    }
    header .page-wrap {
      display: flex;
      align-items: baseline;
      gap: 24px;
      flex-wrap: wrap;
    }
    header h1 {
      font-family: 'Limelight', cursive;
      font-size: 1.6rem;
      color: #f5f5f5;
      letter-spacing: 0.02em;
    }
    header h1 a { color: inherit; text-decoration: none; }
    header h1 a:hover { text-decoration: underline; }
    .header-sub { font-size: 0.82rem; color: #888; }

    .page-wrap {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Controls ── */
    .controls-bar {
      padding: 12px 0;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .controls-bar .page-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .controls-bar input[type=search] {
      padding: 5px 10px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #222;
      color: #e8e8e8;
      font-size: 0.82rem;
      width: 200px;
    }
    .controls-bar input[type=search]::placeholder { color: #666; }

    /* ── Week navigation ── */
    .week-nav { display: flex; align-items: center; gap: 6px; }
    .week-nav button {
      background: #222; border: 1px solid #333; color: #ccc;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;
    }
    .week-nav button:hover { border-color: #888; color: #fff; }
    .week-nav button.today-btn { color: #e5c100; border-color: #5a4800; }
    .week-nav button.today-btn:hover { border-color: #e5c100; }
    .week-label { font-size: 0.82rem; color: #e5c100; min-width: 140px; text-align: center; }

    /* ── Per-row navigation arrows ── */
    .gantt thead th.nav-col,
    .gantt tbody td.nav-col {
      width: 28px; min-width: 28px; padding: 0 2px; text-align: center;
      border-left: none; white-space: nowrap;
    }
    .nav-arrow {
      display: inline-block; font-size: 1.3rem;
      cursor: pointer; padding: 2px 6px; line-height: 1;
      user-select: none; opacity: 0.5;
    }
    .nav-arrow:hover { opacity: 1; }
    .nav-arrow.arrow-default   { color: #d8d8d8; }
    .nav-arrow.arrow-watchlist { color: #2e7d32; }
    .nav-arrow.arrow-director  { color: #1a5fa8; }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 0.75rem;
      color: #888;
      margin-left: auto;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-swatch {
      width: 14px; height: 10px; border-radius: 2px;
    }

    /* ── Main chart ── */
    .chart-wrap {
      overflow: auto;
      /* height set by JS so the chart fills the remaining viewport */
    }
    .chart-wrap .page-wrap {
      padding-top: 16px;
      padding-bottom: 40px;
    }

    table.gantt {
      border-collapse: collapse;
      min-width: 100%;
    }

    /* Header row: date columns */
    .gantt thead th {
      font-size: 0.7rem;
      color: #666;
      font-weight: normal;
      text-align: center;
      padding: 0 0 6px;
      white-space: nowrap;
      border-left: 1px solid #222;
      min-width: 28px;
      position: sticky;
      top: 0;
      background: #111;
      z-index: 10;
    }
    .gantt thead th.today-col {
      color: #e5c100;
      border-left: 1px solid #e5c100;
    }
    .gantt thead th.title-col {
      text-align: left;
      padding-left: 0;
      color: #aaa;
      font-size: 0.72rem;
      border-left: none;
      position: sticky;
      left: 0;
      z-index: 11;
      box-shadow: 2px 0 4px rgba(0,0,0,0.4);
    }

    /* Film rows */
    .gantt tbody tr {
      border-bottom: 1px solid #1c1c1c;
      cursor: pointer;
    }
    .gantt tbody tr:hover td { background: #1a1a1a; }

    .gantt tbody td {
      padding: 3px 0;
      vertical-align: middle;
    }
    .gantt tbody td.title-col {
      padding-right: 14px;
      white-space: nowrap;
      font-size: 0.78rem;
      color: #ccc;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      position: sticky;
      left: 0;
      background: #111;
      z-index: 5;
      box-shadow: 2px 0 4px rgba(0,0,0,0.4);
    }
    .gantt tbody tr:hover td.title-col { background: #1a1a1a; }
    .gantt tbody td.title-col.bar-watchlist { color: #2e7d32; }
    .gantt tbody td.title-col.bar-director  { color: #1a5fa8; }

    .gantt tbody td.day-col {
      border-left: 1px solid #1e1e1e;
      padding: 3px 1px;
      min-width: 28px;
    }
    .gantt tbody td.day-col.today-col {
      border-left: 1px solid #3a3000;
    }

    .bar {
      height: 14px;
      border-radius: 3px;
      width: 100%;
    }
    .bar-default   { background: #d8d8d8; }
    .bar-watchlist { background: #2e7d32; }
    .bar-director  { background: #1a5fa8; }

    /* Out-of-window rows: dimmed */
    .gantt tbody tr.out-of-window { opacity: 0.45; }
    .gantt tbody tr.out-of-window:hover { opacity: 0.8; }

    /* ── Filter row ── */
    .filter-row {
      padding: 8px 0;
      border-top: 1px solid #222;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .filter-btn {
      background: #1c1c1c; border: 1px solid #333; color: #888;
      padding: 3px 9px; border-radius: 4px; cursor: pointer;
      font-size: 0.75rem; white-space: nowrap;
    }
    .filter-btn:hover { border-color: #666; color: #ccc; }
    .filter-btn.active { background: #2a1f00; border-color: #e5c100; color: #e5c100; }
    .filter-sep { width: 1px; height: 18px; background: #333; margin: 0 4px; }
    select.filter-btn { appearance: auto; padding-right: 6px; width: 160px; }

    /* ── Mobile layout ── */
    @media (max-width: 680px) {
      .gantt tbody td.title-col {
        white-space: normal;
        overflow: visible;
        text-overflow: unset;
        max-width: 120px;
        min-width: 90px;
      }
    }

    /* ── No-date section ── */
    .no-date-section {
      padding: 24px 0 40px;
    }
    .no-date-section h2 {
      font-size: 0.85rem;
      color: #555;
      font-weight: normal;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .no-date-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .pill {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: #888;
      cursor: pointer;
    }
    .pill:hover { border-color: #555; color: #ccc; }
    .pill-date { display: block; font-size: 0.72rem; color: #666; margin-top: 2px; }

    /* ── Letterboxd bar ── */
    .lb-bar {
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      padding: 10px 0;
    }
    .lb-bar .page-wrap { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .lb-label { font-size: 0.75rem; font-family: "Courier New", monospace; color: #e5c100; letter-spacing: 0.04em; }
    #lb-username {
      background: #1c1c1c; border: 1px solid #333; border-radius: 4px;
      color: #e8e8e8; font-size: 0.82rem; padding: 4px 10px; width: 160px;
    }
    #lb-username:focus { outline: none; border-color: #e5c100; }
    #lb-username::placeholder { color: #555; }
    #lb-btn {
      padding: 4px 12px; border: 1px solid #5a4800; border-radius: 4px;
      background: #1c1c1c; color: #e5c100; font-size: 0.8rem; cursor: pointer; white-space: nowrap;
    }
    #lb-btn:hover { opacity: 0.8; }
    #lb-btn:disabled { opacity: 0.4; cursor: default; }
    #lb-status { font-size: 0.78rem; font-family: "Courier New", monospace; color: #888; }
    #lb-status.ok  { color: #e5c100; }
    #lb-status.err { color: #f87171; }

    /* ── Modal (reused from main page style) ── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 28px 32px;
      max-width: 540px;
      width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    #modal-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none; color: #888;
      font-size: 1.3rem; cursor: pointer; line-height: 1;
    }
    #modal-close:hover { color: #fff; }
    #modal-title { font-family: 'Limelight', cursive; font-size: 1.2rem; margin-bottom: 8px; }
    #modal-meta  { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; line-height: 1.7; }
    #modal-cast  { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; }
    #modal-desc  { font-size: 0.85rem; color: #ccc; line-height: 1.65; }
    #modal-dates { margin-top: 12px; }
    .modal-theater-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .modal-theater-link { font-size: 0.82rem; color: #e5c100; text-decoration: none; white-space: nowrap; }
    .modal-theater-link:hover { text-decoration: underline; }
    .modal-theater-dates { font-size: 0.75rem; color: #888; }
  </style>
</head>
<body>

<header>
  <div class="page-wrap">
    <h1><a href="index.html">What Cool Movies Are in NYC?</a></h1>
    <a href="list.html" class="header-sub" style="text-decoration:none;" onmouseover="this.style.color='#e5c100'" onmouseout="this.style.color='#888'">List view</a>
  </div>
</header>

<div class="lb-bar">
  <div class="page-wrap">
    <span class="lb-label">Letterboxd</span>
    <input type="text" id="lb-username" placeholder="username" autocomplete="off" spellcheck="false" />
    <button id="lb-btn">Load watchlist</button>
    <span id="lb-status"></span>
  </div>
</div>

<div class="controls-bar">
  <div class="page-wrap">
    <div class="week-nav">
      <button id="prev-week">&#8592; Prev</button>
      <span class="week-label" id="week-label"></span>
      <button id="next-week">Next &#8594;</button>
      <button class="today-btn" id="today-btn">Today</button>
    </div>
    <input type="search" id="search" placeholder="Filter films…">
    <div class="legend">
      <span class="legend-item"><span class="legend-swatch bar-watchlist"></span>On your watchlist</span>
      <span class="legend-item"><span class="legend-swatch bar-director"></span>Director on watchlist</span>
    </div>
  </div>
  <div class="filter-row page-wrap" id="filter-row"></div>
</div>

<div class="chart-wrap" id="chart-wrap">
  <div class="page-wrap">
    <table class="gantt" id="gantt-table">
      <thead id="gantt-head"></thead>
      <tbody id="gantt-body"></tbody>
    </table>

    <div class="no-date-section" id="no-date-section" style="display:none">
      <h2>No scheduling data available</h2>
      <div class="no-date-pills" id="no-date-pills"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-title"></div>
    <div id="modal-meta"></div>
    <div id="modal-cast"></div>
    <div id="modal-desc"></div>
    <div id="modal-dates"></div>
  </div>
</div>

<script>
  // ── Helpers ──────────────────────────────────────────────────────────────
  function isoToDate(s) {
    // Parse YYYY-MM-DD as local date (not UTC)
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function dateToIso(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function addDays(d, n) {
    const r = new Date(d); r.setDate(r.getDate() + n); return r;
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const DAY_ABBR = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // ── State ─────────────────────────────────────────────────────────────────
  let allMovies = [];
  let searchQuery = '';
  const _today = new Date(); _today.setHours(0,0,0,0);
  let currentWeekStart = new Date(_today);

  // Watchlist sets (populated after data loads)
  let wlTitles    = new Set();   // normalised film titles on watchlist
  let wlDirectors = new Set();   // directors of watchlist films (from scraped data)

  // Filter state
  let activeTheaters  = new Set();  // empty = all theaters shown
  let activeDirector  = '';         // empty = all directors shown
  let filterWatchlist = false;
  let filterDirector  = false;
  let filterSaved     = false;
  let filterWeekend   = false;
  let savedFilms      = new Set(JSON.parse(localStorage.getItem('savedFilms') || '[]'));

  const _TITLE_SUFFIXES = /\s*(\(Open Captioning\)|4K Remaster)\s*$/gi;
  function cleanTitle(s) {
    let t = s || '', prev;
    do { prev = t; t = t.replace(_TITLE_SUFFIXES, '').trim(); } while (t !== prev);
    return t;
  }

  function normKey(s) { return cleanTitle(s || '').toLowerCase().replace(/[^a-z0-9]/g, ''); }

  function navigateToDate(iso) {
    currentWeekStart = isoToDate(iso);
    buildChart();
  }

  // ── Watchlist helpers ─────────────────────────────────────────────────────
  function setLbStatus(msg, cls = '') {
    const el = document.getElementById('lb-status');
    el.textContent = msg;
    el.className = cls;
  }

  function rebuildWlSets() {
    wlTitles.clear();
    wlDirectors.clear();
    try {
      const wl = JSON.parse(localStorage.getItem('lbWatchlist') || '[]');
      wl.forEach(f => { if (f.title) wlTitles.add(normKey(f.title)); });
      allMovies.forEach(m => {
        if (wlTitles.has(normKey(m.title)) && m.director) {
          m.director.split(',').forEach(d => { const nd = d.trim().toLowerCase(); if (nd) wlDirectors.add(nd); });
        }
      });
    } catch(_) {}
  }

  async function loadWatchlist(username) {
    const btn = document.getElementById('lb-btn');
    btn.disabled = true;
    setLbStatus('Loading…');
    try {
      const r = await fetch(`/api/watchlist?username=${encodeURIComponent(username)}`);
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      localStorage.setItem('lbWatchlist', JSON.stringify(data.films));
      localStorage.setItem('lbUsername', username);
      btn.textContent = 'Refresh watchlist';
      setLbStatus(`✓ ${data.films.length} films`, 'ok');
      rebuildWlSets();
      buildChart();
    } catch(e) {
      setLbStatus(e.message, 'err');
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('lb-btn').addEventListener('click', () => {
    const username = document.getElementById('lb-username').value.trim();
    if (username) loadWatchlist(username);
  });
  document.getElementById('lb-username').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const username = e.target.value.trim();
      if (username) loadWatchlist(username);
    }
  });

  // ── Modal ─────────────────────────────────────────────────────────────────
  function openModal(movie) {
    const parts = [];
    if (movie.year)    parts.push(movie.year);
    if (movie.country) parts.push(movie.country);
    if (movie.director) parts.push('Dir. ' + movie.director);
    document.getElementById('modal-title').textContent = cleanTitle(movie.title);
    document.getElementById('modal-meta').innerHTML  = parts.join(' &middot; ');
    document.getElementById('modal-cast').textContent = movie.cast ? 'With ' + movie.cast : '';
    document.getElementById('modal-desc').textContent = movie.description || '';

    function formatDates(show_dates, date_start, date_end) {
      if (show_dates && show_dates.length) {
        return show_dates.map(d => {
          const dt = isoToDate(d);
          return `${DAY_ABBR[dt.getDay()]} ${MONTH_ABBR[dt.getMonth()]} ${dt.getDate()}`;
        }).join(', ');
      }
      if (date_start) {
        const s = isoToDate(date_start);
        let label = `${MONTH_ABBR[s.getMonth()]} ${s.getDate()}`;
        if (date_end && date_end !== date_start) {
          const e = isoToDate(date_end);
          label += `–${MONTH_ABBR[e.getMonth()]} ${e.getDate()}`;
        }
        return label;
      }
      return '';
    }

    const theaters = movie.theaters && movie.theaters.length ? movie.theaters : [{ name: movie.theater, url: movie.url, show_dates: movie.show_dates || [], date_start: movie.date_start || '', date_end: movie.date_end || '' }];
    document.getElementById('modal-dates').innerHTML = theaters.map(t => {
      const dates = formatDates(t.show_dates, t.date_start, t.date_end);
      return `<div class="modal-theater-row"><a href="${esc(t.url)}" target="_blank" class="modal-theater-link">${esc(t.name)}</a>${dates ? `<span class="modal-theater-dates">${esc(dates)}</span>` : ''}</div>`;
    }).join('');
    document.getElementById('modal-overlay').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Build chart ───────────────────────────────────────────────────────────
  function movieDates(m) {
    if (m.show_dates && m.show_dates.length) return m.show_dates;
    if (m.date_start) {
      const dates = [];
      let cur = isoToDate(m.date_start);
      const end = isoToDate(m.date_end || m.date_start);
      while (cur <= end && dates.length < 400) { dates.push(dateToIso(cur)); cur = addDays(cur, 1); }
      return dates;
    }
    return [];
  }

  function barClass(m) {
    if (wlTitles.has(normKey(m.title))) return 'bar-watchlist';
    const dirs = (m.director || '').split(',').map(d => d.trim().toLowerCase()).filter(Boolean);
    if (dirs.some(d => wlDirectors.has(d))) return 'bar-director';
    return 'bar-default';
  }

  function updateChartHeight() {
    const topH = (document.querySelector('header')      ?.offsetHeight || 0)
               + (document.querySelector('.lb-bar')     ?.offsetHeight || 0)
               + (document.querySelector('.controls-bar')?.offsetHeight || 0);
    document.getElementById('chart-wrap').style.height = `calc(100vh - ${topH}px)`;
  }

  window.addEventListener('resize', updateChartHeight);

  function buildChart() {
    const todayIso       = dateToIso(_today);
    const windowStart    = currentWeekStart;
    const windowEnd      = addDays(windowStart, 6);
    const windowStartIso = dateToIso(windowStart);
    const windowEndIso   = dateToIso(windowEnd);

    const ws = windowStart, we = windowEnd;
    document.getElementById('week-label').textContent =
      `${MONTH_ABBR[ws.getMonth()]} ${ws.getDate()} – ${MONTH_ABBR[we.getMonth()]} ${we.getDate()}`;

    // 7 columns
    const cols = [];
    for (let i = 0; i < 7; i++) {
      const d = addDays(windowStart, i);
      cols.push({ iso: dateToIso(d), date: d, isToday: dateToIso(d) === todayIso });
    }

    const q = searchQuery.toLowerCase();

    const withDates = [];
    const noDates   = [];

    for (const m of allMovies) {
      // ── Text search ──
      if (q && !m.title.toLowerCase().includes(q) &&
          !(m.director||'').toLowerCase().includes(q) &&
          !(m.theater||'').toLowerCase().includes(q)) continue;

      // ── Theater filter ──
      if (activeTheaters.size > 0) {
        const theaterNames = (m.theaters || []).map(t => t.name);
        if (!theaterNames.some(t => activeTheaters.has(t))) continue;
      }

      // ── Director dropdown filter ──
      if (activeDirector && (m.director || '') !== activeDirector) continue;

      // ── Saved / weekend / watchlist / director filters ──
      if (filterSaved && !savedFilms.has(normKey(m.title))) continue;
      if (filterWeekend) {
        const hasWeekend = movieDates(m).some(iso => { const d = isoToDate(iso).getDay(); return d === 0 || d === 5 || d === 6; });
        if (!hasWeekend) continue;
      }
      if (filterWatchlist && !wlTitles.has(normKey(m.title))) continue;
      if (filterDirector) {
        const dirs = (m.director || '').split(',').map(d => d.trim().toLowerCase()).filter(Boolean);
        if (!dirs.some(d => wlDirectors.has(d))) continue;
      }

      const allDates = movieDates(m);
      if (!allDates.length) { noDates.push(m); continue; }

      const colSet        = new Set(allDates.filter(d => d >= windowStartIso && d <= windowEndIso));
      const before        = allDates.filter(d => d < windowStartIso);
      const after         = allDates.filter(d => d > windowEndIso);
      const nearestBefore = before.length ? before[before.length - 1] : null;
      const nearestAfter  = after.length  ? after[0]                  : null;

      withDates.push({ m, colSet, nearestBefore, nearestAfter });
    }

    // Sort: in-window first (by first date in window), then future, then past
    withDates.sort((a, b) => {
      const aIn = a.colSet.size > 0, bIn = b.colSet.size > 0;
      if (aIn !== bIn) return aIn ? -1 : 1;
      const aFirst = movieDates(a.m)[0] || '9999';
      const bFirst = movieDates(b.m)[0] || '9999';
      if (aFirst !== bFirst) return aFirst < bFirst ? -1 : 1;
      return a.m.title.localeCompare(b.m.title);
    });

    // ── Render header ──
    const head = document.getElementById('gantt-head');
    let headHtml = '<tr><th class="title-col">Film</th><th class="nav-col" style="font-size:0.65rem;color:#555;">Earlier</th>';
    for (const col of cols) {
      const cls = col.isToday ? 'today-col' : '';
      const dow = DAY_ABBR[col.date.getDay()];
      const day = col.date.getDate();
      const showMonth = col.date.getDate() === 1 || col === cols[0];
      const label = showMonth ? `${MONTH_ABBR[col.date.getMonth()]}<br>${day}` : `${dow}<br>${day}`;
      headHtml += `<th class="${cls}">${label}</th>`;
    }
    headHtml += '<th class="nav-col" style="font-size:0.65rem;color:#555;">Later</th></tr>';
    head.innerHTML = headHtml;

    // ── Render body ──
    const body = document.getElementById('gantt-body');
    let bodyHtml = '';

    for (const { m, colSet, nearestBefore, nearestAfter } of withDates) {
      const mJson    = esc(JSON.stringify(m));
      const bc       = barClass(m);
      const rowCls   = colSet.size === 0 ? ' class="out-of-window"' : '';
      const arrowCls   = `nav-arrow arrow-${bc.replace('bar-', '')}`;
      const leftArrow  = nearestBefore
        ? `<span class="${arrowCls}" title="Jump to ${nearestBefore}" onclick="event.stopPropagation();navigateToDate('${nearestBefore}')">&#8592;</span>` : '';
      const rightArrow = nearestAfter
        ? `<span class="${arrowCls}" title="Jump to ${nearestAfter}" onclick="event.stopPropagation();navigateToDate('${nearestAfter}')">&#8594;</span>` : '';

      bodyHtml += `<tr${rowCls} onclick="openModal(${mJson})">`;
      bodyHtml += `<td class="title-col ${bc}" title="${esc(cleanTitle(m.title))} — ${esc(m.theater)}">${esc(cleanTitle(m.title))}</td>`;
      bodyHtml += `<td class="nav-col">${leftArrow}</td>`;
      for (const col of cols) {
        const cls = col.isToday ? 'day-col today-col' : 'day-col';
        bodyHtml += colSet.has(col.iso)
          ? `<td class="${cls}"><div class="bar ${bc}"></div></td>`
          : `<td class="${cls}"></td>`;
      }
      bodyHtml += `<td class="nav-col">${rightArrow}</td>`;
      bodyHtml += '</tr>';
    }
    body.innerHTML = bodyHtml;

    // ── No-date section ──
    const noDateSec   = document.getElementById('no-date-section');
    const noDatePills = document.getElementById('no-date-pills');
    if (noDates.length) {
      noDateSec.style.display = '';
      noDates.sort((a, b) => a.title.localeCompare(b.title));
      noDatePills.innerHTML = noDates.map(m =>
        `<span class="pill" onclick="openModal(${esc(JSON.stringify(m))})" title="${esc(m.theater)}">${esc(m.title)}</span>`
      ).join('');
    } else {
      noDateSec.style.display = 'none';
    }
    updateChartHeight();
  }

  // ── Controls ──────────────────────────────────────────────────────────────
  document.getElementById('prev-week').addEventListener('click', () => {
    currentWeekStart = addDays(currentWeekStart, -7);
    buildChart();
  });
  document.getElementById('next-week').addEventListener('click', () => {
    currentWeekStart = addDays(currentWeekStart, 7);
    buildChart();
  });
  document.getElementById('today-btn').addEventListener('click', () => {
    currentWeekStart = new Date(_today);
    buildChart();
  });

  document.getElementById('search').addEventListener('input', function() {
    searchQuery = this.value;
    buildChart();
  });

  // ── Load data ──────────────────────────────────────────────────────────────
  fetch('movies.json')
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(data => {
      // Deduplicate by title: merge show_dates across theater entries, keep per-theater info
      const byTitle = new Map();
      for (const m of (data.movies || [])) {
        const key = normKey(m.title);
        const theaterEntry = { name: m.theater, url: m.url, show_dates: m.show_dates || [], date_start: m.date_start || '', date_end: m.date_end || '' };
        if (!byTitle.has(key)) {
          byTitle.set(key, Object.assign({}, m, { theaters: [theaterEntry] }));
        } else {
          const existing = byTitle.get(key);
          existing.theaters.push(theaterEntry);
          const merged = new Set([...(existing.show_dates || []), ...(m.show_dates || [])]);
          existing.show_dates = Array.from(merged).sort();
          if (m.date_start && (!existing.date_start || m.date_start < existing.date_start))
            existing.date_start = m.date_start;
          if (m.date_end && (!existing.date_end || m.date_end > existing.date_end))
            existing.date_end = m.date_end;
          if (!existing.theater.includes(m.theater))
            existing.theater += ', ' + m.theater;
        }
      }
      allMovies = Array.from(byTitle.values());

      // ── Watchlist sets + restore saved state ──
      rebuildWlSets();
      const savedWl = JSON.parse(localStorage.getItem('lbWatchlist') || '[]');
      if (savedWl.length) {
        document.getElementById('lb-btn').textContent = 'Refresh watchlist';
        setLbStatus(`✓ ${savedWl.length} films`, 'ok');
      }
      const savedUser = localStorage.getItem('lbUsername');
      if (savedUser) document.getElementById('lb-username').value = savedUser;

      // ── Theater dropdown + special filter buttons ──
      const allTheaters = [...new Set(allMovies.flatMap(m => (m.theaters || []).map(t => t.name)))].sort();
      const allDirectors = [...new Set(allMovies.map(m => m.director).filter(Boolean))].sort();
      const filterRow = document.getElementById('filter-row');
      let filterHtml = '<select id="theater-select" class="filter-btn"><option value="">All theaters</option>';
      allTheaters.forEach(t => { filterHtml += `<option value="${esc(t)}">${esc(t)}</option>`; });
      filterHtml += '</select>';
      filterHtml += '<select id="director-select" class="filter-btn"><option value="">All directors</option>';
      allDirectors.forEach(d => { filterHtml += `<option value="${esc(d)}">${esc(d)}</option>`; });
      filterHtml += '</select>';
      filterHtml += '<span class="filter-sep"></span>';
      filterHtml += `<button class="filter-btn" id="saved-filter-btn">Saved</button>`;
      filterHtml += `<button class="filter-btn" id="weekend-filter-btn">Weekend showing</button>`;
      filterHtml += `<button class="filter-btn" id="wl-filter-btn">On my watchlist</button>`;
      filterHtml += `<button class="filter-btn" id="dir-filter-btn">Director on watchlist</button>`;
      filterRow.innerHTML = filterHtml;

      document.getElementById('theater-select').addEventListener('change', function() {
        activeTheaters.clear();
        if (this.value) activeTheaters.add(this.value);
        buildChart();
      });
      document.getElementById('director-select').addEventListener('change', function() {
        activeDirector = this.value;
        buildChart();
      });
      document.getElementById('saved-filter-btn').addEventListener('click', function() {
        savedFilms = new Set(JSON.parse(localStorage.getItem('savedFilms') || '[]'));
        filterSaved = !filterSaved;
        this.classList.toggle('active', filterSaved);
        buildChart();
      });
      document.getElementById('weekend-filter-btn').addEventListener('click', function() {
        filterWeekend = !filterWeekend;
        this.classList.toggle('active', filterWeekend);
        buildChart();
      });
      document.getElementById('wl-filter-btn').addEventListener('click', function() {
        filterWatchlist = !filterWatchlist;
        this.classList.toggle('active', filterWatchlist);
        buildChart();
      });
      document.getElementById('dir-filter-btn').addEventListener('click', function() {
        filterDirector = !filterDirector;
        this.classList.toggle('active', filterDirector);
        buildChart();
      });

      buildChart();
    })
    .catch(err => {
      document.getElementById('gantt-body').innerHTML =
        `<tr><td colspan="100" style="padding:20px;color:#e55">Failed to load: ${err.message}</td></tr>`;
    });
</script>
</body>
</html>
